@if (contenedores().length > 1) {
  <div class="relative">
    <button
      type="button"
      class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md border border-gray-200 dark:border-coal-200 hover:bg-gray-50 dark:hover:bg-coal-400 text-sm font-medium text-gray-700 dark:text-gray-200 transition-colors"
      [disabled]="cargandoCambio()"
      (click)="toggle()"
    >
      <i class="ki-filled ki-abstract-26 text-base text-gray-500"></i>
      <span class="max-w-[160px] truncate">
        {{ contenedorActivoNombre$ | async }}
      </span>
      <i
        class="ki-filled text-xs"
        [class.ki-down]="!abierto()"
        [class.ki-up]="abierto()"
      ></i>
    </button>

    @if (abierto()) {
      <div
        class="fixed inset-0 z-10"
        (click)="cerrar()"
      ></div>
      <div
        class="absolute right-0 mt-1 w-72 rounded-lg border border-gray-200 dark:border-coal-200 bg-white dark:bg-coal-500 shadow-lg z-20 max-h-96 overflow-y-auto"
      >
        <div class="px-3 py-2 border-b border-gray-100 dark:border-coal-300">
          <span class="text-[11px] uppercase tracking-wide text-gray-500 dark:text-gray-300 font-semibold">
            Cambiar contenedor
          </span>
        </div>
        @for (item of contenedores(); track item.contenedor_id) {
          <button
            type="button"
            class="w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-50 dark:hover:bg-coal-400 text-left transition-colors"
            [class.bg-primary]="esActivo(item, contenedorActivoId$ | async)"
            [class.bg-opacity-5]="esActivo(item, contenedorActivoId$ | async)"
            (click)="cambiar(item)"
            [disabled]="cargandoCambio() || esActivo(item, contenedorActivoId$ | async)"
          >
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="font-medium text-sm text-gray-900 dark:text-gray-100 truncate">
                  {{ item.contenedor__nombre }}
                </span>
                @if (esActivo(item, contenedorActivoId$ | async)) {
                  <i class="ki-filled ki-check text-primary text-xs"></i>
                }
              </div>
              <div class="text-[11px] text-gray-500 dark:text-gray-400">
                {{ item.contenedor__schema_name }}
              </div>
            </div>
            <span
              class="badge badge-xs badge-outline shrink-0"
              [ngClass]="rolEtiqueta(item.rol).clase"
            >
              {{ rolEtiqueta(item.rol).texto }}
            </span>
          </button>
        }
      </div>
    }
  </div>
}
