<ng-container class="h-100">
  <div
    class="sidebar-header hidden lg:flex items-center relative justify-between px-3 lg:px-6 shrink-0"
    id="sidebar_header"
  >
    <a href="/" class="block max-w-full">
      <img
        class="default-logo h-8 w-auto max-w-full object-contain"
        src="assets/media/app/default-logo.png"
        alt="Ruteo.co"
      />
      <img
        class="small-logo h-8 w-auto max-w-full object-contain"
        src="assets/media/app/mini-logo.jpg"
        alt=""
      />
    </a>
    <button
      class="btn btn-icon btn-icon-md size-[30px] rounded-lg border border-gray-200 dark:border-gray-200 bg-light dark:bg-coal-500 text-gray-500 hover:text-gray-700 dark:hover:text-gray-800 toggle absolute left-full top-2/4 -translate-x-2/4 -translate-y-2/4"
      data-toggle="body"
      data-toggle-class="sidebar-collapse"
      id="sidebar_toggle"
    >
      <i
        class="ki-filled ki-black-left-line toggle-active:rotate-180 transition-all duration-300"
      >
      </i>
    </button>
  </div>
  <div
    class="sidebar-content flex grow shrink-0 py-5 pr-2 h-100"
    style="height: 100% !important"
    id="sidebar_content"
  >
    <div
      class="scrollable-y-hover grow shrink-0 flex pl-2 lg:pl-5 pr-1 lg:pr-3"
      data-scrollable="true"
      data-scrollable-dependencies="#sidebar_header"
      data-scrollable-height="auto"
      data-scrollable-offset="0px"
      data-scrollable-wrappers="#sidebar_content"
      id="sidebar_scrollable"
    >
      <div
        class="menu flex flex-col grow gap-0.5"
        data-menu="true"
        data-menu-accordion-expand-all="false"
        id="sidebar_menu"
      >
        @for (menu of sidebarMenu; track $index) { @if (puedeVerMenu(menu)) { @if (!menu.tipoAcordion) {
        <div class="menu-item" data-menu-item-trigger="click">
          <div
            class="menu-label gap-[10px] pl-[10px] pr-[10px] py-[6px] border border-transparent rounded-lg transition-colors cursor-pointer"
            [routerLink]="menu.link"
            routerLinkActive="bg-primary/10 dark:bg-primary/15 border-primary/20 dark:border-primary/30"
            [ngClass]="{
              'hover:bg-gray-100 dark:hover:bg-coal-400': !isActive(menu.link)
            }"
            (click)="onMenuClick(menu)"
            tabindex="0"
          >
            <span
              class="menu-icon items-start w-[20px] text-gray-500"
            >
              <i
                [class]="menu.iconoClase + ' text-lg '"
                routerLinkActive="text-primary"
              ></i>
            </span>
            <span
              routerLinkActive="text-primary font-semibold"
              class="menu-title text-sm font-semibold"
              [ngClass]="{
                'text-gray-700': !isActive(menu.link)
              }"
            >
              {{ menu.nombre }}
            </span>
          </div>
        </div>
        } @else {
        <div
          class="menu-item"
          [class.show]="isAccordionOpen(menu.nombre)"
        >
          <div
            class="menu-link flex items-center grow cursor-pointer border border-transparent gap-[10px] pl-[10px] pr-[10px] py-[6px] rounded-lg hover:bg-gray-100 dark:hover:bg-coal-400 transition-colors"
            tabindex="0"
            (click)="toggleAccordion(menu.nombre)"
          >
            <span
              class="menu-icon items-start text-gray-500 w-[20px]"
            >
              <i [class]="menu.iconoClase + ' text-lg'"></i>
            </span>
            <span
              class="menu-title text-sm text-gray-700 menu-item-active:text-primary menu-link-hover:!text-primary"
            >
              {{ menu.nombre }}
            </span>
            <span
              class="menu-arrow text-gray-400 dark:text-gray-500 w-[20px] shrink-0 justify-end ml-1 mr-[-10px]"
            >
              <i
                class="ki-filled ki-plus text-2xs"
                [class.hidden]="isAccordionOpen(menu.nombre)"
              > </i>
              <i
                class="ki-filled ki-minus text-2xs"
                [class.hidden]="!isAccordionOpen(menu.nombre)"
              >
              </i>
            </span>
          </div>
          <div
            class="menu-accordion gap-0.5 pl-[10px] relative before:absolute before:left-[20px] before:top-0 before:bottom-0 before:border-l before:border-gray-200 dark:before:border-coal-200"
            [class.hidden]="!isAccordionOpen(menu.nombre)"
          >
            @for (subMenu of menu?.children; track $index) {
            @if (puedeVerSubmenu(subMenu)) {
            <div class="menu-item">
              <a
                class="menu-link gap-[14px] pl-[10px] pr-[10px] py-[8px] border border-transparent items-center grow hover:bg-gray-100 dark:hover:bg-coal-400 hover:rounded-lg transition-colors"
                [routerLink]="subMenu.link"
                [ngClass]="{
                  'bg-primary/10 dark:bg-primary/15 rounded-lg': isActive(subMenu.link)
                }"
                (click)="onSubMenuClick(subMenu)"
                tabindex="0"
              >
                <span
                  class="menu-bullet flex w-[6px] relative before:absolute before:top-0 before:size-[6px] before:rounded-full before:-translate-x-1/2 before:-translate-y-1/2 menu-item-hover:before:bg-primary"
                  [ngClass]="{ 'before:bg-primary': isActive(subMenu.link) }"
                >
                </span>
                <span
                  class="menu-title text-2sm font-medium menu-link-hover:!text-primary"
                  [ngClass]="{
                    'text-primary font-semibold': isActive(subMenu.link),
                    'text-gray-700': !isActive(subMenu.link)
                  }"
                >
                  {{ subMenu.nombre }}
                </span>
              </a>
            </div>
            }
            }
          </div>
        </div>
        }
        }
        }
      </div>
    </div>
  </div>
</ng-container>
