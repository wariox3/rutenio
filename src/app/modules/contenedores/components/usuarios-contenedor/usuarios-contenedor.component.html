<div class="container mx-auto p-4">
  <div class="mb-4">
    <h1 class="text-2xl font-bold text-gray-900">Usuarios del contenedor</h1>
    <p class="text-sm text-gray-500 mt-1">
      Invita miembros, ajusta sus perfiles (web/móvil) y configura permisos por módulo.
    </p>
  </div>

  @if (contenedor) {
    <app-contenedor-invitar [contenedor]="contenedor"></app-contenedor-invitar>
  } @else {
    <div class="card">
      <div class="card-body text-center py-12 text-gray-500">
        <i class="ki-outline ki-information-3 text-3xl text-gray-400"></i>
        <p class="mt-2">Selecciona un contenedor para gestionar sus miembros.</p>
      </div>
    </div>
  }
</div>
