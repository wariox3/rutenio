<table class="table-auto border border-gray-300 dark:border-gray-600 text-sm w-full">
    <thead>
        <tr class="bg-gray-100 dark:bg-gray-800">
            <th class="px-4 py-2 font-bold text-gray-700 dark:text-gray-200 border-r border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-800">Id</th>
            <th class="px-4 py-2 font-bold text-gray-700 dark:text-gray-200 border-r border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-800">Fecha</th>
            <th class="px-4 py-2 font-bold text-gray-700 dark:text-gray-200 border-r border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-800">Descripción</th>
            <th class="px-4 py-2 font-bold text-gray-700 dark:text-gray-200 border-r border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-800">Fecha solución</th>
            <th class="px-4 py-2 font-bold text-gray-700 dark:text-gray-200 border-r border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-800">Solucion</th>
            <th class="px-4 py-2 font-bold text-gray-700 dark:text-gray-200 border-r border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-800">Sol</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let novedad of novedades()" class="border-b border-gray-300 dark:border-gray-600">
            <td class="px-4 py-2 border border-gray-300 dark:border-gray-600">{{ novedad.id }}</td>
            <td class="px-4 py-2 border border-gray-300 dark:border-gray-600">{{ novedad.fecha | formatFecha:'Y-m-d' }}</td>
            <td class="px-4 py-2 border border-gray-300 dark:border-gray-600">{{ novedad.descripcion }}</td>
            <td class="px-4 py-2 border border-gray-300 dark:border-gray-600">{{ novedad.fecha_solucion | formatFecha:'Y-m-d' }}</td>
            <td class="px-4 py-2 border border-gray-300 dark:border-gray-600">{{ novedad.solucion }}</td>
            <td class="px-4 py-2 border border-gray-300 dark:border-gray-600">{{ novedad.estado_solucion | validarBooleano }}</td>
            <td class="px-4 py-2 border border-gray-300 dark:border-gray-600 text-center">
                <div class="flex justify-center">
                    <button
                        class="dropdown-toggle btn btn-secondary flex items-center"
                        data-modal-toggle="#solucion-novedad-modal"
                        (click)="abrirModal(novedad.id)"
                        [disabled]="novedad.estado_solucion"
                    >
                        <span class="menu-title"> Solución </span>
                    </button>
                </div>
            </td>
        </tr>
    </tbody>
</table>

<app-modal-default
    size="medium"
    [id]="'solucion-novedad-modal'"
    titulo="Solución"
    (emitirModalCerrado)="cerrarModal()"
>
    <section *ngIf="toggleModal$ | async" modal-body>
        <app-novedad-solucion [novedadId]="selectedNovedadId" (emitirNovedadSolucion)="actualizarNovedad()"></app-novedad-solucion>
    </section>
</app-modal-default>
