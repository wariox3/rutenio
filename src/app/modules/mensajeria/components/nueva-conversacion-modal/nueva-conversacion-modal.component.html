<div *ngIf="abierto"
     class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm modal-fade"
     (click)="cerrarSinEnviar()"
     (keydown.escape)="cerrarSinEnviar()"
     tabindex="-1">

  <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl w-full max-w-md max-h-[92vh] flex flex-col modal-pop"
       (click)="$event.stopPropagation()"
       role="dialog"
       aria-labelledby="nueva-conv-titulo">

    <!-- Header con jerarquía: icono ambient + título grande + subtítulo -->
    <div class="flex items-start gap-3 px-5 pt-5 pb-3 border-b border-gray-100 dark:border-gray-800">
      <div class="shrink-0 w-10 h-10 rounded-xl bg-green-100 dark:bg-green-500/20 text-green-700 dark:text-green-400 flex items-center justify-center">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          <path d="M12 8v4M12 16h.01" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <h3 id="nueva-conv-titulo" class="text-base font-semibold text-gray-800 dark:text-gray-100">
          Nueva conversación
        </h3>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">
          El primer mensaje debe ser una plantilla aprobada por Meta.
        </p>
      </div>
      <button type="button" (click)="cerrarSinEnviar()"
              aria-label="Cerrar"
              class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M6 18 18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <form [formGroup]="form" (ngSubmit)="enviar()"
          class="px-5 py-4 overflow-y-auto flex flex-col gap-5">

      <!-- Datos del destinatario -->
      <div class="flex flex-col gap-3">
        <label class="block text-[11px] uppercase tracking-wide font-semibold text-gray-500 dark:text-gray-400">
          Destinatario
        </label>
        <div>
          <input type="tel" formControlName="telefono" placeholder="Teléfono — ej. 3006134088"
                 class="w-full px-3 py-2 text-sm rounded-lg border bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500
                        focus:outline-none focus:ring-2 focus:ring-green-500/30 transition"
                 [ngClass]="form.controls.telefono.invalid && form.controls.telefono.touched
                   ? 'border-red-300 dark:border-red-500/50'
                   : 'border-gray-300 dark:border-gray-700'"/>
          <ng-container *ngIf="form.controls.telefono.touched && form.controls.telefono.errors as errs">
            <p *ngIf="errs['required']" class="mt-1 text-[11px] text-red-600 dark:text-red-400">El teléfono es requerido.</p>
            <p *ngIf="errs['telefonoFormato']" class="mt-1 text-[11px] text-red-600 dark:text-red-400">Solo números, espacios, +, - y ()</p>
            <p *ngIf="errs['telefonoCorto']" class="mt-1 text-[11px] text-red-600 dark:text-red-400">Mínimo 10 dígitos.</p>
            <p *ngIf="errs['telefonoLargo']" class="mt-1 text-[11px] text-red-600 dark:text-red-400">Máximo 15 dígitos.</p>
          </ng-container>
        </div>
        <input type="text" formControlName="nombre" placeholder="Nombre (opcional)"
               class="w-full px-3 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500/30 transition"/>
      </div>

      <!-- Selector de plantilla + variables + preview (subcomponente) -->
      <app-plantilla-selector
        [resetSignal]="resetSelectorSignal"
        (validityChange)="onPlantillaValidityChange($event)"
        (valueChange)="onPlantillaValueChange($event)">
      </app-plantilla-selector>
    </form>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-2 px-5 py-3 border-t border-gray-100 dark:border-gray-800 bg-gray-50/60 dark:bg-gray-950/40">
      <button type="button" (click)="cerrarSinEnviar()" [disabled]="enviando"
              class="px-4 py-2 text-sm font-medium rounded-lg text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-800 disabled:opacity-50 transition">
        Cancelar
      </button>
      <button type="button" (click)="enviar()"
              [disabled]="form.invalid || plantillaInvalida || enviando"
              class="px-4 py-2 text-sm font-semibold rounded-lg bg-green-600 text-white shadow-sm shadow-green-600/30 hover:bg-green-700 active:scale-[.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none transition flex items-center gap-2">
        <svg *ngIf="enviando" class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
          <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
        </svg>
        @if (!enviando) {
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        }
        {{ enviando ? 'Enviando…' : 'Enviar plantilla' }}
      </button>
    </div>
  </div>
</div>
