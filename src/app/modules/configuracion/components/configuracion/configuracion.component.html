<button
  (click)="goBack()"
  class="btn btn-secondary mb-4 inline-flex items-center"
>
  <i class="ki-duotone ki-left"></i>
  Volver
</button>
<div class="card">
  <div class="card-header">
    <h1 class="card-title">Configuración</h1>
  </div>
  <div class="card-body p-6">
    <form [formGroup]="formularioConfiguracion" class="space-y-6">
      <div class="flex items-start justify-between mb-6">
        <div class="relative w-[100px] lg:w-[160px] h-[100px] lg:h-[160px]">
          <app-cargar-imagen
            [recibirImagen]="getUserImageUrl() | async"
            (dataFormulario)="recuperarBase64($event)"
            (eliminarLogo)="eliminarLogo($event)"
          ></app-cargar-imagen>
        </div>
        <button
          id="tour-config-guardar"
          (click)="submit()"
          class="btn btn-primary px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
        >
          Guardar
        </button>
      </div>
      <div id="tour-config-direccion" class="space-y-4">
        <app-buscador-direcciones
          (addressSelected)="onAddressSelected($event)"
          [direccionSeleccionada]="
            formularioConfiguracion.get('rut_direccion_origen')?.value
          "
        ></app-buscador-direcciones>
      </div>
      <div class="space-y-4">
        <div>
          <label class="form-label font-normal text-gray-900">Hora de salida de vehículos</label>
          <input
            type="time"
            class="input w-auto"
            formControlName="rut_hora_inicio"
          />
          <p class="text-xs text-gray-500 mt-1">Hora estimada de salida de los vehículos. Se usa para calcular ventanas horarias de citas.</p>
        </div>
        <div>
          <label class="form-label font-normal text-gray-900">Estrategia de ruteo</label>
          <select class="select w-auto" formControlName="rut_estrategia_ruteo">
            <option value="distancia">Ruta más corta</option>
            <option value="balanceado">Balanceado</option>
            <option value="tiempo">Menor tiempo</option>
          </select>
          <p class="text-xs text-gray-500 mt-1">
            Ruta más corta: prioriza distancia, pasa por citas de camino.
            Menor tiempo: evita esperas, llega justo a las citas.
            Balanceado: equilibrio entre ambas.
          </p>
        </div>
      </div>
      <div id="tour-config-opciones" class="space-y-4">
        <app-switch
          titulo="Sincronizar complemento"
          [control]="
            formularioConfiguracion.controls.rut_sincronizar_complemento
          "
          class="block"
        ></app-switch>

        <app-switch
          titulo="Rutear por franjas"
          [control]="formularioConfiguracion.controls.rut_rutear_franja"
          class="block"
        ></app-switch>

        <app-switch
          titulo="Notificaciones WhatsApp"
          [control]="formularioConfiguracion.controls.rut_whatsapp_habilitado"
          class="block"
        ></app-switch>
      </div>
    </form>
  </div>
</div>
