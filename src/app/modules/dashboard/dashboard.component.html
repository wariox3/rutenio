<div class="dashboard-contenedor">
  <!-- Header -->
  <div class="flex items-center justify-between mb-5">
    <div>
      <h1 class="text-2xl font-bold text-[#575757]">
        Salud de la <span class="text-[#0098d7]">Operación</span>
      </h1>
      <p class="text-sm text-[#575757] mt-0.5">Indicadores clave de desempeño en tiempo real</p>
    </div>
    <div class="flex items-center gap-2">
      @if (cargando()) {
        <span class="text-xs text-[#575757] flex items-center gap-1">
          <i class="ki-filled ki-loading animate-spin text-[#0098d7]"></i>
          Actualizando...
        </span>
      }
    </div>
  </div>

  <!-- Filtros -->
  <app-dashboard-filtros (filtrosAplicados)="cargarDatos($event)"></app-dashboard-filtros>

  <!-- KPIs -->
  <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mb-5">
    @for (kpi of kpis(); track kpi.titulo) {
      <app-dashboard-kpi-tarjeta [kpi]="kpi"></app-dashboard-kpi-tarjeta>
    }
  </div>

  <!-- Fila inferior: Gráfico, Cumplimiento, Mapa -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
    <div>
      @if (desempeno()) {
        <app-dashboard-desempeno-chart [datos]="desempeno()!"></app-dashboard-desempeno-chart>
      }
    </div>
    <div>
      @if (cumplimientoZonas().length > 0) {
        <app-dashboard-cumplimiento-zona [zonas]="cumplimientoZonas()"></app-dashboard-cumplimiento-zona>
      }
    </div>
    <div>
      <app-dashboard-mapa [marcadores]="marcadoresMapa()"></app-dashboard-mapa>
    </div>
  </div>
</div>
