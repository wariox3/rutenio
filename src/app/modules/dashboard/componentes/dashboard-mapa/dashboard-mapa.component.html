<div class="bg-white rounded-lg shadow-sm border border-gray-100 p-4 h-full">
  <h3 class="text-sm font-semibold text-[#575757] mb-3">Mapa de Despachos en Ruta</h3>
  @if (marcadores && marcadores.length > 0) {
    <div class="mapa-contenedor rounded-lg overflow-hidden">
      <google-map
        width="100%"
        height="300px"
        [center]="centro"
        [zoom]="zoom"
        [options]="opcionesMapa"
      >
        @for (marcador of marcadores; track marcador.titulo) {
          <map-marker
            [position]="{ lat: marcador.lat, lng: marcador.lng }"
            [title]="marcador.titulo || ''"
            [icon]="obtenerIconoMarcador(marcador.tipo)"
          ></map-marker>
        }
      </google-map>
    </div>
    <div class="flex gap-4 mt-2 text-xs text-[#575757]">
      <span class="flex items-center gap-1">
        <span class="w-2.5 h-2.5 rounded-full inline-block" style="background-color: #0098d7"></span>
        Sin novedad
      </span>
      <span class="flex items-center gap-1">
        <span class="w-2.5 h-2.5 rounded-full inline-block" style="background-color: #f1416c"></span>
        Con novedad
      </span>
    </div>
  } @else {
    <div class="flex flex-col items-center justify-center h-[300px] text-[#575757]">
      <i class="ki-filled ki-map text-4xl mb-2 text-[#0098d7]"></i>
      <p class="text-sm">No hay despachos en ruta con ubicación</p>
    </div>
  }
</div>
