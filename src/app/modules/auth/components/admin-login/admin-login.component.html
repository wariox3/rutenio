<div
  class="flex h-[100vh] justify-center items-center p-8 lg:p-10 login-container"
>
  <div class="card max-w-[400px] w-full">
    <form
      [formGroup]="formularioLogin"
      class="card-body flex flex-col gap-5 p-10"
      (submit)="enviar()"
    >
      <div class="text-center mb-2.5">
        <h3 class="text-lg font-medium text-gray-900 leading-none mb-2.5">
          Admin Ruteo.co
        </h3>
        <p class="text-2sm text-gray-500">Panel de administración</p>
      </div>

      @if (errorMensaje) {
        <div class="bg-red-50 text-red-600 text-sm p-3 rounded-lg">
          {{ errorMensaje }}
        </div>
      }

      <div class="flex flex-col gap-1">
        <label class="form-label font-normal text-gray-900">Email</label>
        <app-input-email
          [control]="formularioLogin.controls.username"
        ></app-input-email>
      </div>
      <div class="flex flex-col gap-1">
        <label class="form-label font-normal text-gray-900">Contraseña</label>
        <app-input-password
          [control]="formularioLogin.controls.password"
        ></app-input-password>
      </div>

      <div class="w-full">
        <app-button
          [type]="'submit'"
          [texto]="'Ingresar'"
          [textoCargando]="'Ingresando...'"
          [estaCargando]="isLoading$ | async"
          [clases]="'btn btn-primary w-full text-center justify-center'"
          [estaDeshabilitado]="!this.formularioLogin.valid"
        ></app-button>
      </div>
    </form>
  </div>
</div>
