<div class="card mb-5">
  <div class="card-body py-4">
    <div class="flex flex-col md:flex-row md:items-center gap-3">
      <div class="relative flex-1 min-w-0">
        <i class="ki-filled ki-magnifier absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input
          type="text"
          class="input pl-9 w-full"
          placeholder="Buscar por placa..."
          [ngModel]="busquedaPlaca"
          (ngModelChange)="onBusquedaPlacaChange($event)"
        />
      </div>

      <div class="flex items-center gap-1 shrink-0">
        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mr-1">Estado</span>
        @for (opcion of [
          { valor: 'todos', etiqueta: 'Todos' },
          { valor: 'activo', etiqueta: 'Activos' },
          { valor: 'inactivo', etiqueta: 'Inactivos' }
        ]; track opcion.valor) {
          <button
            type="button"
            class="btn btn-sm"
            [ngClass]="estadoFiltro === opcion.valor ? 'btn-primary' : 'btn-light'"
            (click)="onEstadoChange($any(opcion.valor))"
          >
            {{ opcion.etiqueta }}
          </button>
        }
      </div>

      @if (hayBusquedaActiva) {
        <button type="button" class="btn btn-sm btn-light gap-1 shrink-0" (click)="limpiarBusqueda()">
          <i class="ki-filled ki-cross text-xs"></i>
          Limpiar
        </button>
      }
    </div>
  </div>
</div>

<div id="tour-vehiculo-tabla" class="card min-w-full">
  <div class="card-header">
    <h3 class="card-title">Vehículos</h3>
    <app-button
      *appPermisoPor="'vehiculo.editar'"
      id="tour-vehiculo-nuevo"
      routerLink="/administracion/vehiculo/nuevo"
      type="button"
      texto="Nuevo"
    ></app-button>
  </div>
  <div >
    <div class="flex justify-between items-center mx-8">
      <app-paginador
        [totalItems]="estadoPaginacion().totalItems"
        [itemsPerPage]="estadoPaginacion().itemsPorPagina"
        (pageChange)="onPageChange($event)"
      ></app-paginador>
      <div class="flex justify-end items-center mx-8" *appPermisoPor="'vehiculo.editar'">
        <div class="inline-flex rounded-md shadow-s my-5">
          <div class="menu menu-default p-0" data-menu="true">
            <button
              id="tour-vehiculo-importar"
              class="menu-toggle px-4 py-2 text-sm font-medium text-gray-900 bg-white dark:bg-gray-100 dark:bg-coal-300 border-y border-x border-gray-200 dark:border-gray-200 rounded-e-lg"
              (click)="abrirModal('importarVehiculos')"
            >
              Importar
            </button>
            <div
              class="menu-item"
              data-menu-item-placement="bottom-start"
              data-menu-item-toggle="dropdown"
              data-menu-item-trigger="click"
            >
              <button
                class="menu-toggle px-4 py-2 text-sm font-medium text-gray-900 bg-white dark:bg-gray-100 dark:bg-coal-300 border-y border-x border-gray-200 dark:border-gray-200 rounded-e-lg"
              >
                <span class=""> Acciones </span>
                <span class="menu-arrow">
                  <i class="ki-outline ki-down"> </i>
                </span>
              </button>
              <div class="menu-dropdown w-48 py-2">
                <div class="menu-item" data-menu-dismiss="true">
                  <button
                    class="menu-link"
                    (click)="eliminarItemsSeleccionados()"
                  >
                    <span class="menu-title"> Eliminar </span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
    <app-tabla-comun
      campoMapeo="Vehiculo"
      [mapeo]="mapeoAdministrador"
      [datos]="arrVehiculos"
      (emitirEditarItem)="editarVehiculo($event)"
      (emitirItemsSeleccionados)="actualizarItemsSeleccionados($event)"
      (emitirDetalleItem)="detalleVehiculo($event)"
    ></app-tabla-comun>
  </div>

<app-modal-standard
  title="Importar vehículos"
  size="xl"
  modalId="importarVehiculos"
>
  @if (getModalInstaceState('importarVehiculos') | async) {
    <app-importar
    (emitirCerrarModal)="cerrarModal('importarVehiculos')"
    (emitirConsultarLista)="handleUploadSuccess($event)"
    archivosAdmitidos='.xls,.xlsx'
    url="ruteo/vehiculo/importar/"
    exampleFileUrl="https://semantica.sfo3.digitaloceanspaces.com/rutenio/ejemplos/importar_vehiculo.xlsx"
    exampleFileName="importar_vehiculo.xlsx"
  ></app-importar>
  }
</app-modal-standard>
