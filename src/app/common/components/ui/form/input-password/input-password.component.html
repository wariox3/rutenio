<div class="input" data-toggle-password="true" [ngClass]="{
  'border-danger': control.touched && control.invalid,
  'border-success': control.touched && control.valid
}">
  <i class="ki-outline ki-lock text-gray-400"></i>
  <input [value]="value" [formControl]="control" [placeholder]="placeholder"
    [type]="visibleInput ? 'text': 'password'" />
  <div class="btn btn-icon" data-toggle-password-trigger="true">
    <i (click)="toggleVisibleInput()" *ngIf="visibleInput" class="ki-outline ki-eye"></i>
    <i (click)="toggleVisibleInput()" *ngIf="!visibleInput" class="ki-outline ki-eye-slash"></i>
  </div>
</div>

<ng-container *ngIf="control.invalid && control.touched">
  <span *ngIf="control.hasError('required')" class="text-danger text-xs mt-1 block">
    La contraseña es requerida.
  </span>
  <span *ngIf="control.hasError('minlength')" class="text-danger text-xs mt-1 block">
    Mínimo 8 caracteres.
  </span>
  <span *ngIf="control.hasError('maxlength')" class="text-danger text-xs mt-1 block">
    Máximo 20 caracteres.
  </span>
  <span *ngIf="control.hasError('clavesDiferentes')" class="text-danger text-xs mt-1 block">
    La contraseña y la confirmación no coinciden.
  </span>
</ng-container>
