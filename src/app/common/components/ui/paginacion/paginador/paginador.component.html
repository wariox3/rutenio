<div class="paginator-container flex items-center gap-2 text-sm text-gray-700">
  <span class="mr-2">Página</span>

  <input
    type="number"
    class="page-input px-2 py-1 text-sm rounded
           border border-gray-300 dark:border-gray-200
           bg-white dark:bg-gray-100 text-gray-800
           focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500"
    [(ngModel)]="currentPage"
    (change)="onPageChange(currentPage)"
    (keyup.enter)="onPageChange(currentPage)"
    [min]="1"
    [max]="totalPages"
  />

  <span class="mx-2">de {{ totalPages }}</span>

  <div class="flex gap-1">
    <button
      class="px-2 py-1 rounded text-gray-600
             hover:bg-gray-100 dark:hover:bg-coal-200
             disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      (click)="prevPage()"
      [disabled]="currentPage === 1"
    >
      <i class="ki-outline ki-arrow-left text-xl"></i>
    </button>
    <button
      class="px-2 py-1 rounded text-gray-600
             hover:bg-gray-100 dark:hover:bg-coal-200
             disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      (click)="nextPage()"
      [disabled]="currentPage === totalPages"
    >
      <i class="ki-outline ki-arrow-right text-xl"></i>
    </button>
  </div>

  <span class="text-gray-500">Registros: {{ totalItems }}</span>
</div>
