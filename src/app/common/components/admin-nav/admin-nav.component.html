<!-- ================= TOPBAR MOBILE ================= -->
<div class="md:hidden sticky top-0 z-30 flex items-center justify-between h-14 px-4 bg-gray-900 border-b border-gray-800">
  <button type="button" (click)="toggle()"
          class="p-2 -ml-1 rounded-md text-gray-300 hover:text-white hover:bg-gray-800 transition"
          aria-label="Abrir menú">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
      <path d="M3 6h18M3 12h18M3 18h18"/>
    </svg>
  </button>
  <div class="flex items-center gap-2">
    <div class="relative flex items-center justify-center w-7 h-7 rounded-md bg-gradient-to-br from-blue-500 to-blue-600 shadow-md shadow-blue-500/20">
      <span class="text-[11.5px] font-bold text-white tracking-tight">R</span>
      <span class="absolute -bottom-0.5 -right-0.5 w-1.5 h-1.5 rounded-full bg-red-500 ring-2 ring-gray-900"></span>
    </div>
    <span class="text-[13px] font-semibold text-white">Rutenio</span>
    <span class="inline-flex items-center text-[9px] font-semibold uppercase tracking-wider text-red-400 bg-red-500/10 border border-red-500/20 rounded px-1 py-0.5">
      Admin
    </span>
  </div>
  <button (click)="cerrarSesion()" class="p-2 -mr-1 rounded-md text-gray-400 hover:text-red-400 hover:bg-gray-800 transition"
          aria-label="Salir">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </button>
</div>

<!-- ================= BACKDROP MOBILE ================= -->
<div *ngIf="abierto"
     (click)="cerrar()"
     class="md:hidden fixed inset-0 z-40 bg-gray-900/60 backdrop-blur-sm transition-opacity"
     aria-hidden="true">
</div>

<!-- ================= SIDEBAR / DRAWER ================= -->
<aside class="fixed left-0 top-0 z-50 h-screen w-64 bg-gray-900 border-r border-gray-800 flex flex-col transition-transform duration-300 ease-out
              md:translate-x-0"
       [ngClass]="abierto ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">

  <!-- Header sidebar -->
  <div class="flex items-center justify-between px-5 h-16 border-b border-gray-800">
    <a routerLink="/admin/entregas" class="flex items-center gap-2.5 min-w-0">
      <div class="relative flex items-center justify-center w-9 h-9 rounded-lg bg-gradient-to-br from-blue-500 to-blue-600 shadow-lg shadow-blue-500/20 shrink-0">
        <span class="text-[14px] font-bold text-white tracking-tight">R</span>
        <span class="absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full bg-red-500 ring-2 ring-gray-900"></span>
      </div>
      <div class="flex flex-col min-w-0">
        <span class="text-[14px] font-semibold text-white tracking-tight leading-tight">Rutenio</span>
        <span class="inline-flex items-center gap-1 text-[9.5px] font-semibold uppercase tracking-wider text-red-400 leading-tight mt-0.5">
          <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
          Admin panel
        </span>
      </div>
    </a>
    <button type="button" (click)="cerrar()"
            class="md:hidden p-1.5 -mr-1 rounded-md text-gray-400 hover:text-white hover:bg-gray-800 transition"
            aria-label="Cerrar menú">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Nav items -->
  <nav class="flex-1 px-3 py-4 overflow-y-auto">
    <div class="text-[10px] font-semibold uppercase tracking-wider text-gray-500 px-2 mb-2">General</div>
    <ul class="space-y-0.5">
      @for (enlace of enlaces; track enlace.ruta) {
        <li>
          <a [routerLink]="enlace.ruta"
             routerLinkActive
             #rla="routerLinkActive"
             [routerLinkActiveOptions]="{ exact: true }"
             class="relative flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-[13px] font-medium transition-colors"
             [ngClass]="rla.isActive
               ? 'text-white bg-gray-800/80'
               : 'text-gray-400 hover:text-white hover:bg-gray-800/50'">
            <span class="absolute left-0 top-1/2 -translate-y-1/2 w-0.5 h-5 rounded-r bg-blue-400 transition-opacity"
                  [ngClass]="rla.isActive ? 'opacity-100' : 'opacity-0'"></span>
            <i [ngClass]="enlace.icono" class="text-[15px] shrink-0"></i>
            <span class="truncate">{{ enlace.etiqueta }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer sidebar -->
  <div class="border-t border-gray-800 p-3 space-y-0.5">
    <a routerLink="/contenedor/lista"
       class="flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-[12.5px] font-medium text-gray-400 hover:text-white hover:bg-gray-800/50 transition">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Volver a contenedores
    </a>
    <button type="button" (click)="cerrarSesion()"
            class="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-[12.5px] font-medium text-gray-400 hover:text-red-400 hover:bg-red-500/10 transition">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Cerrar sesión
    </button>
  </div>
</aside>
