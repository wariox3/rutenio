<!doctype html>
<html class="h-full" data-theme="true" data-theme-mode="light" lang="en">

<head>
	<meta charset="utf-8">
	<title>Ruteo</title>
	<base href="/">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<link href="./assets/css/styles.css" rel="stylesheet" />
	<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyABnddF-aGC5kNcSk74Brfqd4U0ZDlKAgM&libraries=geometry"></script>

	<!--begin::Theme mode pre-load (evita FOUC antes que Tailwind compile)-->
	<script>
		(function() {
			const defaultThemeMode = 'light';
			let themeMode = localStorage.getItem('theme')
				|| document.documentElement.getAttribute('data-theme-mode')
				|| defaultThemeMode;
			if (themeMode === 'system') {
				themeMode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
			}
			document.documentElement.classList.add(themeMode);
		})();
	</script>
	<style>
		/* Fondo aplicado inmediatamente al <html> según el modo, antes de que
		   Tailwind compile dark:bg-coal-500. Evita el flash blanco al cargar. */
		html { background: #fefefe; }
		html.dark { background: #0D0E12; /* coal-500 */ }
		html.dark body { background: #0D0E12; }
	</style>
  </head>

<body root class="antialiased h-full demo1 sidebar-fixed header-fixed bg-[#fefefe] dark:bg-coal-500">
</body>

</html>
